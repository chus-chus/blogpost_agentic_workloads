output_dir: benchmark_output/workload_deployment_claim_case_study/qwen

linear_benchmark_config: linear.veeksha.yml
dag_benchmark_config: dag.veeksha.yml
trace_metadata_path: traces/workload_deployment_claim_case_study/workload_metadata.json

rate_basis: request_rate
start_value: 2.0
max_value: 16.0
expansion_factor: 2.0
max_iterations: 16
precision: 2

guardrails:
  min_completed_requests: 0
  min_completion_ratio: 0.0
  max_error_rate: 0.02
  max_ttfc_p95_s: 0.75
  max_e2e_p95_s: null
  max_tbc_p95_s: 0.075
  require_all_slos_met: true

vllm_metrics:
  enabled: true
  require_metrics: true
  scrape_timeout_s: 10.0
