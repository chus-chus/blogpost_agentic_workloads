- type: performance
  target_channels: ["text"]
  stream_metrics: false
  slos:
    - type: constant
      name: "P99 TTFC <= 3s"
      metric: ttfc
      percentile: 0.99
      value: 3.0
    - type: constant
      name: "P95 E2E <= 20s"
      metric: e2e
      percentile: 0.95
      value: 20.0
    - type: constant
      name: "P99 TBC <= 150ms"
      metric: tbc
      percentile: 0.99
      value: 0.15
  text_channel:
    decode_window_enabled: true
    decode_window_config:
      min_active_requests: "max_observed"
      selection_strategy: all
      anchor_to_client_pickup: true
      require_streaming: true

